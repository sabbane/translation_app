# Server Konfiguration
server.port=8080

# Datenbank Konfiguration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/translation_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Konfiguration
# In Produktion sollte das Secret eine lange, zufällige Zeichenfolge sein
translationapp.jwtSecret=bezahlenSieNiemalsFuerEinenSchluesselDerNichtSicherIst123456
translationapp.jwtExpirationMs=86400000

# DeepL API Konfiguration
# Ersetze dies durch deinen echten API-Key (z.B. in einer lokalen application-local.properties oder als Umgebungsvariable)
deepl.api.key=2a57d6c7-6ac9-4a44-9205-9d50e6181cf2:fx