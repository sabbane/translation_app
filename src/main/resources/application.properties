# Server Konfiguration
server.port=${PORT:8080}

# Datenbank Konfiguration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/translation_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Konfiguration
translationapp.jwtSecret=${JWT_SECRET:bezahlenSieNiemalsFuerEinenSchluesselDerNichtSicherIst123456}
translationapp.jwtExpirationMs=86400000

# DeepL API Konfiguration
deepl.api.key=${DEEPL_API_KEY:test-key}