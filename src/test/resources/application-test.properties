# Server Konfiguration für Tests
server.port=0

# Datenbank Konfiguration (PostgreSQL) - Testdatenbank!
spring.datasource.url=jdbc:postgresql://localhost:5432/translation_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Konfiguration
translationapp.jwtSecret=testSecretKeyWhichIsVeryLongAndSecureForTests1234567890
translationapp.jwtExpirationMs=86400000

# DeepL API Konfiguration (Wird ohnehin gemockt)
deepl.api.key=test-api-key
